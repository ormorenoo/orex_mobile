<ion-header>
  <ion-toolbar>
    <ion-title>
      <div class="hd">
        <span class="hd__hi">Hola, {{ account?.firstName || 'técnico' }}</span>
        <span class="hd__role">Técnico de terreno</span>
      </div>
    </ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Estado de conexión -->
  <div class="conn">
    <span class="conn__chip" [class.conn__chip--off]="!online">
      <span class="conn__dot"></span>{{ online ? 'En línea' : 'Sin conexión' }}
    </span>
  </div>

  <!-- Escanear QR -->
  <button type="button" class="scan-cta" (click)="goScan()">
    <span class="scan-cta__icon"><ion-icon name="scan-outline"></ion-icon></span>
    <span class="scan-cta__txt">
      <span class="scan-cta__t">Escanear QR de mesa</span>
      <span class="scan-cta__s">Abre la mesa y registra en terreno</span>
    </span>
  </button>

  <button type="button" class="codigo-link" (click)="ingresarCodigo()">
    <ion-icon name="keypad-outline"></ion-icon>
    Ingresar código manualmente
  </button>

  <!-- Contadores / accesos -->
  <div class="counters">
    <button type="button" class="counter" (click)="goTo('inspeccion')">
      <ion-icon name="clipboard-outline"></ion-icon>
      <span class="counter__l">Inspecciones</span>
    </button>
    <button type="button" class="counter" (click)="goTo('mantenimiento')">
      <ion-icon name="construct-outline"></ion-icon>
      <span class="counter__l">Mantenimientos</span>
    </button>
  </div>

  <!-- Mesas recientes -->
  @if (mesasRecientes.length) {
    <div class="seccion-titulo">Mesas recientes</div>
    <div class="mesas">
      @for (mesa of mesasRecientes; track mesa.id) {
        <button type="button" class="mesa-item" (click)="abrirMesa(mesa)">
          <span class="mesa-item__av mono">{{ mesa.id }}</span>
          <span class="mesa-item__body">
            <span class="mesa-item__id mono">{{ mesa.identificador }}</span>
            <span class="mesa-item__sub">{{ subtituloMesa(mesa) }}</span>
          </span>
          <ion-icon name="chevron-forward"></ion-icon>
        </button>
      }
    </div>
  }

  <!-- Sincronizar -->
  <ion-button *ngIf="online" class="sync-btn" expand="block" fill="outline" [disabled]="isLoading" (click)="sync()">
    <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
    <ng-container *ngIf="!isLoading">
      <ion-icon slot="start" name="sync-outline"></ion-icon>
      Sincronizar
    </ng-container>
  </ion-button>
</ion-content>
