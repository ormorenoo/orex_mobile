<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Área por faena</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- CABECERA -->
  <div class="det-head">
    <div class="det-head__row">
      <span class="det-head__id mono">AF #{{ areaFaena.id }}</span>
    </div>
    <div class="det-head__sub">Relación área · faena</div>
  </div>

  <div class="page">
    <ion-card>
      <ion-card-header><ion-card-title>Vínculo</ion-card-title></ion-card-header>
      <ion-card-content>
        <div class="field">
          <div class="field-label">Área</div>
          <p>{{ areaFaena.area?.nombre || (areaFaena.area?.id ? 'Área ' + areaFaena.area.id : '—') }}</p>
        </div>
        <div class="field">
          <div class="field-label">Faena</div>
          <p>{{ areaFaena.faena?.nombre || (areaFaena.faena?.id ? 'Faena ' + areaFaena.faena.id : '—') }}</p>
        </div>
      </ion-card-content>
    </ion-card>

    <div class="acciones">
      <ion-button expand="block" (click)="open(areaFaena)">Editar</ion-button>
      <ion-button expand="block" fill="outline" color="danger" (click)="deleteModal(areaFaena)">Eliminar</ion-button>
    </div>
  </div>
</ion-content>
