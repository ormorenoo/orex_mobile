<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Polines</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-refresher [disabled]="plt.is('desktop')" slot="fixed" (ionRefresh)="loadAll($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="reg-list">
    @for (polin of polins; track trackId($index, polin)) {
      <ion-item-sliding #slidingItem>
        <button type="button" class="reg-card {{ estadoClase(polin.estado) }}" (click)="view(polin)">
          <span class="reg-card__bar"></span>
          <span class="reg-card__main">
            <span class="reg-card__top">
              <span class="reg-card__code mono">{{ polin.identificador }}</span>
              <span class="badge {{ estadoClase(polin.estado) }}">{{ estadoLabel(polin.estado) }}</span>
            </span>
            <span class="reg-card__detail">{{ posicionLabel(polin.posicionPolin) }} · {{ tipoPolinLabel(polin.tipoPolin) }}</span>
            @if (polin.descripcion) {
              <span class="reg-card__sub">{{ polin.descripcion }}</span>
            }
          </span>
          <ion-icon name="chevron-forward"></ion-icon>
        </button>
        <ion-item-options side="end">
          <ion-item-option color="primary" (click)="edit(slidingItem, polin)">
            Editar
          </ion-item-option>
          <ion-item-option color="danger" (click)="delete(polin)">
            Eliminar
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    }
  </div>

  @if (!polins?.length) {
    <div class="reg-empty">No hay polines registrados.</div>
  }

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="new()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
