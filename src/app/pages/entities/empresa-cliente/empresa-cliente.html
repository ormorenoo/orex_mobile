<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Empresa Clientes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-refresher [disabled]="plt.is('desktop')" slot="fixed" (ionRefresh)="loadAll($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="reg-list">
    @for (empresaCliente of empresaClientes; track trackId($index, empresaCliente)) {
      <ion-item-sliding #slidingItem>
        <button type="button" class="reg-card" (click)="view(empresaCliente)">
          <span class="reg-card__bar"></span>
          <span class="reg-card__main">
            <span class="reg-card__top">
              <span class="reg-card__code mono">{{ empresaCliente.rut || ('EC #' + empresaCliente.id) }}</span>
            </span>
            <span class="reg-card__detail">{{ empresaCliente.razonSocial || '—' }}</span>
            <span class="reg-card__sub">
              {{ empresaCliente.nombreContacto || 'Sin contacto' }}
              @if (empresaCliente.telefono) {
                · {{ empresaCliente.telefono }}
              }
            </span>
          </span>
          <ion-icon name="chevron-forward"></ion-icon>
        </button>
        <ion-item-options side="end">
          <ion-item-option color="primary" (click)="edit(slidingItem, empresaCliente)">
            Editar
          </ion-item-option>
          <ion-item-option color="danger" (click)="delete(empresaCliente)">
            Eliminar
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    }
  </div>

  @if (!empresaClientes?.length) {
    <div class="reg-empty">No hay empresas cliente registradas.</div>
  }

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="new()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
