<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isNew ? 'Nueva faena' : 'Editar faena' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (form) {
    <form name="form" [formGroup]="form" (ngSubmit)="save()">
      <div class="form-body">
        <ion-item class="form-item" [hidden]="!form.get('id').value">
          <ion-label position="floating">ID</ion-label>
          <ion-input type="text" id="id" formControlName="id" readonly></ion-input>
        </ion-item>

        <ion-item class="form-item">
          <ion-label position="floating">Nombre</ion-label>
          <ion-input type="text" name="nombre" formControlName="nombre"></ion-input>
        </ion-item>

        <ion-item class="form-item">
          <ion-label position="stacked">Cliente mandante</ion-label>
          <ion-select interface="popover" id="field_clienteMandante" formControlName="clienteMandanteId" [compareWith]="compareClienteMandante">
            <ion-select-option [value]="null">Seleccione...</ion-select-option>
            @for (clienteMandanteOption of clienteMandantes; track trackClienteMandanteById($index, clienteMandanteOption)) {
              <ion-select-option [value]="clienteMandanteOption.id">{{ clienteMandanteOption.id }}</ion-select-option>
            }
          </ion-select>
        </ion-item>
      </div>

      <!-- GUARDAR (sticky) -->
      <div class="save-bar">
        <ion-button expand="block" shape="round" size="large" type="submit" [disabled]="!isReadyToSave || isSaving">
          Guardar faena
        </ion-button>
      </div>
    </form>
  }
</ion-content>
