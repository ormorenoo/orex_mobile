<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Faenas</ion-title>
  </ion-toolbar>
</ion-header>

<!-- todo: add elasticsearch support -->
<ion-content class="ion-padding">
  <ion-refresher [disabled]="plt.is('desktop')" slot="fixed" (ionRefresh)="loadAll($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="reg-list">
    @for (faena of faenas; track trackId($index, faena)) {
      <ion-item-sliding #slidingItem>
        <button type="button" class="reg-card reg-card--plain" (click)="view(faena)">
          <span class="reg-card__bar"></span>
          <span class="reg-card__main">
            <span class="reg-card__top">
              <span class="reg-card__code mono">FAENA #{{ faena.id }}</span>
            </span>
            <span class="reg-card__detail">{{ faena.nombre || '—' }}</span>
          </span>
          <ion-icon name="chevron-forward"></ion-icon>
        </button>
        <ion-item-options side="end">
          <ion-item-option color="primary" (click)="edit(slidingItem, faena)">
            Editar
          </ion-item-option>
          <ion-item-option color="danger" (click)="delete(faena)">
            Eliminar
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    }
  </div>

  @if (!faenas?.length) {
    <div class="reg-empty">No hay faenas registradas.</div>
  }

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="new()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
