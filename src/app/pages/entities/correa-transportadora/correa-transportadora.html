<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Correas transportadoras</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-refresher [disabled]="plt.is('desktop')" slot="fixed" (ionRefresh)="loadAll($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="reg-list">
    @for (correaTransportadora of correaTransportadoras; track trackId($index, correaTransportadora)) {
      <button type="button" class="reg-card estado--steel" (click)="view(correaTransportadora)">
        <span class="reg-card__bar"></span>
        <span class="reg-card__main">
          <span class="reg-card__top">
            <span class="reg-card__code mono">{{ correaTransportadora.tagId || '—' }}</span>
          </span>
          <span class="reg-card__sub">ID {{ correaTransportadora.id }}</span>
        </span>
        <ion-icon name="chevron-forward"></ion-icon>
      </button>
    }
  </div>

  @if (!correaTransportadoras?.length) {
    <div class="reg-empty">No hay correas transportadoras registradas.</div>
  }

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="new()">
      <ion-icon class="add" name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
