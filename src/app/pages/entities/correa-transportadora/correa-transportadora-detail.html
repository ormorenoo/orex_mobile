<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Correa transportadora</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="open(correaTransportadora)">
        <ion-icon slot="icon-only" name="create-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- CABECERA -->
  <div class="det-head">
    <div class="det-head__row">
      <span class="det-head__id mono">{{ correaTransportadora.tagId || '—' }}</span>
    </div>
    <div class="det-head__sub">Correa transportadora · ID {{ correaTransportadora.id }}</div>
  </div>

  <div class="page">
    <!-- IDENTIFICACIÓN -->
    <ion-card>
      <ion-card-header><ion-card-title>Identificación</ion-card-title></ion-card-header>
      <ion-card-content>
        <div class="field">
          <div class="field-label">Tag ID</div>
          <p class="mono">{{ correaTransportadora.tagId || '—' }}</p>
        </div>
        <div class="field">
          <div class="field-label">ID</div>
          <p>{{ correaTransportadora.id }}</p>
        </div>
        <div class="field" *ngIf="correaTransportadora.areaFaena">
          <div class="field-label">Área · Faena</div>
          <p class="mono">{{ correaTransportadora.areaFaena.id }}</p>
        </div>
      </ion-card-content>
    </ion-card>

    <ion-button class="btn-eliminar" expand="block" fill="outline" color="danger" (click)="deleteModal(correaTransportadora)">
      Eliminar
    </ion-button>
  </div>
</ion-content>
