<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Inspecciones</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-refresher [disabled]="plt.is('desktop')" slot="fixed" (ionRefresh)="loadData($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="reg-list">
    @for (inspeccion of inspeccions; track trackId($index, inspeccion)) {
      <button type="button" class="reg-card {{ estadoClase(inspeccion.condicion) }}" (click)="view(inspeccion)">
        <span class="reg-card__bar"></span>
        <span class="reg-card__main">
          <span class="reg-card__top">
            <span class="reg-card__code mono">INS #{{ inspeccion.id ?? inspeccion.idLocal }}</span>
            <span class="badge {{ estadoClase(inspeccion.condicion) }}">{{ estadoLabel(inspeccion.condicion) }}</span>
          </span>
          <span class="reg-card__detail">
            {{ inspeccion.polin?.identificador ? 'Polín ' + inspeccion.polin.identificador : 'Estación ' + (inspeccion.estacion?.identificador || '—') }}
            @if (inspeccion.criticidad) {
              · {{ inspeccion.criticidad }}
            }
          </span>
          <span class="reg-card__sub">{{ inspeccion.fechaCreacion | date: 'dd-MM-yyyy HH:mm' }} · {{ inspeccion.applicationUser?.login ?? 'local' }}</span>
        </span>
        <ion-icon name="chevron-forward"></ion-icon>
      </button>
    }
  </div>

  @if (!inspeccions?.length) {
    <div class="reg-empty">No hay inspecciones registradas.</div>
  }

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="new()">
      <ion-icon class="add" name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
