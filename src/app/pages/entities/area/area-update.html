<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isNew ? 'Nueva área' : 'Editar área' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (form) {
    <form name="form" [formGroup]="form" (ngSubmit)="save()">
      <div class="form-body">
        <ion-item class="form-item" [hidden]="!form.get('id').value">
          <ion-label position="stacked">ID</ion-label>
          <ion-input type="text" id="id" formControlName="id" readonly></ion-input>
        </ion-item>
        <ion-item class="form-item">
          <ion-label position="stacked">Nombre</ion-label>
          <ion-input type="text" name="nombre" formControlName="nombre"></ion-input>
        </ion-item>
      </div>

      <!-- GUARDAR (sticky) -->
      <div class="save-bar">
        <ion-button expand="block" shape="round" size="large" [disabled]="!isReadyToSave || isSaving" (click)="save()">
          Guardar área
        </ion-button>
      </div>
    </form>
  }
</ion-content>
