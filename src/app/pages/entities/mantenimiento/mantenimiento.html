<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Mantenimientos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-refresher [disabled]="plt.is('desktop')" slot="fixed" (ionRefresh)="loadData($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="reg-list">
    @for (mantenimiento of mantenimientos; track trackId($index, mantenimiento)) {
      <button type="button" class="reg-card {{ estadoClase(mantenimiento.condicion) }}" (click)="view(mantenimiento)">
        <span class="reg-card__bar"></span>
        <span class="reg-card__main">
          <span class="reg-card__top">
            <span class="reg-card__code mono">MNT #{{ mantenimiento.id ?? mantenimiento.idLocal }}</span>
            <span class="badge {{ estadoClase(mantenimiento.condicion) }}">{{ estadoLabel(mantenimiento.condicion) }}</span>
          </span>
          <span class="reg-card__detail">
            {{ mantenimiento.polin?.identificador ? 'Polín ' + mantenimiento.polin.identificador : 'Estación ' + (mantenimiento.estacion?.identificador || '—') }}
            @if (mantenimiento.tipoMantenimiento) {
              · {{ mantenimiento.tipoMantenimiento }}
            }
          </span>
          <span class="reg-card__sub">{{ mantenimiento.fechaCreacion | date: 'dd-MM-yyyy HH:mm' }} · {{ mantenimiento.applicationUser?.login ?? 'local' }}</span>
        </span>
        <ion-icon name="chevron-forward"></ion-icon>
      </button>
    }
  </div>
  @if (!mantenimientos?.length) {
    <div class="reg-empty">No hay mantenimientos registrados.</div>
  }

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="new()">
      <ion-icon class="add" name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
