<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isNew ? 'Nuevo cliente mandante' : 'Editar cliente mandante' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (form) {
    <form name="form" [formGroup]="form" (ngSubmit)="save()">
      <div class="form-body">
        <ion-input type="hidden" id="id" formControlName="id" readonly [hidden]="true"></ion-input>

        <div class="field__label">Identificación</div>
        <ion-list class="form-list">
          <ion-item class="form-item">
            <ion-label position="stacked">Rut</ion-label>
            <ion-input type="text" name="rut" formControlName="rut"></ion-input>
          </ion-item>
          <ion-item class="form-item">
            <ion-label position="stacked">Razón social</ion-label>
            <ion-input type="text" name="razonSocial" formControlName="razonSocial"></ion-input>
          </ion-item>
          <ion-item class="form-item">
            <ion-label position="stacked">Dirección</ion-label>
            <ion-input type="text" name="direccion" formControlName="direccion"></ion-input>
          </ion-item>
        </ion-list>

        <div class="field__label">Contacto</div>
        <ion-list class="form-list">
          <ion-item class="form-item">
            <ion-label position="stacked">Nombre contacto</ion-label>
            <ion-input type="text" name="nombreContacto" formControlName="nombreContacto"></ion-input>
          </ion-item>
          <ion-item class="form-item">
            <ion-label position="stacked">Teléfono</ion-label>
            <ion-input type="tel" name="telefono" formControlName="telefono"></ion-input>
          </ion-item>
          <ion-item class="form-item">
            <ion-label position="stacked">Correo</ion-label>
            <ion-input type="email" name="correo" formControlName="correo"></ion-input>
          </ion-item>
        </ion-list>
      </div>

      <!-- GUARDAR (sticky) -->
      <div class="save-bar">
        <ion-button expand="block" shape="round" size="large" [disabled]="!isReadyToSave || isSaving" (click)="save()">
          {{ isNew ? 'Crear cliente' : 'Guardar cambios' }}
        </ion-button>
      </div>
    </form>
  }
</ion-content>
