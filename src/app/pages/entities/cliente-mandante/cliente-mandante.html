<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Cliente Mandantes</ion-title>
  </ion-toolbar>
</ion-header>

<!-- todo: add elasticsearch support -->
<ion-content class="ion-padding">
  <ion-refresher [disabled]="plt.is('desktop')" slot="fixed" (ionRefresh)="loadAll($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="reg-list">
    @for (clienteMandante of clienteMandantes; track trackId($index, clienteMandante)) {
      <ion-item-sliding #slidingItem>
        <button type="button" class="reg-card" (click)="view(clienteMandante)">
          <span class="reg-card__bar"></span>
          <span class="reg-card__main">
            <span class="reg-card__top">
              <span class="reg-card__code mono">#{{ clienteMandante.id }}</span>
              <span class="reg-card__detail">{{ clienteMandante.razonSocial || '—' }}</span>
            </span>
            <span class="reg-card__sub mono">{{ clienteMandante.rut || 'Sin RUT' }}</span>
            <span class="reg-card__sub">
              {{ clienteMandante.nombreContacto || 'Sin contacto' }}
              @if (clienteMandante.telefono) {
                · {{ clienteMandante.telefono }}
              }
            </span>
          </span>
          <ion-icon name="chevron-forward"></ion-icon>
        </button>
        <ion-item-options side="end">
          <ion-item-option color="primary" (click)="edit(slidingItem, clienteMandante)">
            Editar
          </ion-item-option>
          <ion-item-option color="danger" (click)="delete(clienteMandante)">
            Eliminar
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    }
  </div>

  @if (!clienteMandantes?.length) {
    <div class="reg-empty">No hay clientes mandantes registrados.</div>
  }

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="new()">
      <ion-icon class="add" name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
